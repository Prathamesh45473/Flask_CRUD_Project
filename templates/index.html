{% extends 'base.html' %}

{% block content %}

<a href="/add">Add Student</a>

<table border="1">
<tr>
<th>ID</th>
<th>Name</th>
<th>Email</th>
<th>Actions</th>
</tr>

{% for student in students %}

<tr>
<td>{{ student.id }}</td>
<td>{{ student.name }}</td>
<td>{{ student.email }}</td>

<td>
<a href="/edit/{{ student.id }}">Edit</a>
<a href="/delete/{{ student.id }}">Delete</a>
</td>

</tr>

{% endfor %}

</table>

{% endblock %}
